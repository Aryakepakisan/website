<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense & Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Expense & Budget Visualizer</h1>
        <button id="theme-toggle" class="btn-toggle">🌙 Mode Gelap</button>
      </header>

      <div class="balance-card">
        <h2>TOTAL BALANCE</h2>
        <div id="total-balance" class="balance-amount">$0.00</div>
      </div>

      <section class="form-section">
        <h3>Add Transaction</h3>
        <form id="transaction-form">
          <div class="form-group-vertical">
            <div class="form-control">
              <label for="item-name">Item Name</label>
              <input
                type="text"
                id="item-name"
                placeholder="e.g., Cilok, Coffee"
                required
              />
            </div>
            <div class="form-control">
              <label for="amount">Amount ($)</label>
              <input
                type="number"
                id="amount"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>
            <div class="form-control">
              <label for="category">Category</label>
              <select id="category" required>
                <option value="" disabled selected>Select category</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Fun">Fun</option>
              </select>
            </div>
          </div>
          <button type="submit" class="btn-submit">Add Transaction</button>
        </form>
      </section>

      <div class="bottom-layout">
        <section class="list-section">
          <div class="list-header">
            <h3>Transactions</h3>
            <div class="sort-control">
              <label for="sort-select">Sort by:</label>
              <select id="sort-select">
                <option value="latest">Latest</option>
                <option value="highest">Highest Amount</option>
                <option value="lowest">Lowest Amount</option>
              </select>
            </div>
          </div>
          <ul id="transaction-list" class="scrollable-list"></ul>
        </section>

        <section class="chart-section">
          <h3>Spending by Category</h3>
          <div class="chart-container">
            <canvas id="expense-chart"></canvas>
          </div>
        </section>
      </div>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
